<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Part 1 gradients -->
    <radialGradient id="shieldGlow">
  <stop offset="0%" stop-color="#00eaff"/>
  <stop offset="100%" stop-color="#00eaff" stop-opacity="0"/>
</radialGradient>


    <!-- Part 2 gradients -->
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#1ddfff"/>
  <stop offset="100%" stop-color="#1b3fff"/>
</linearGradient>
  </defs>

  <!-- Part 1 Background -->
  <!-- ========================= -->
<!-- LEFT SERVER RACK -->
<!-- ========================= -->
<g id="servers-left" transform="translate(120,420)">
  <polygon points="0,40 70,0 140,40 70,80" fill="#0b1533"/>
  <polygon points="0,40 0,170 70,210 70,80" fill="#101c42"/>
  <polygon points="140,40 140,170 70,210 70,80" fill="#162856"/>

  <!-- server layers -->
  <g>
    <rect x="20" y="55" width="100" height="20" rx="4" fill="#11244d"/>
    <rect x="20" y="85" width="100" height="20" rx="4" fill="#11244d"/>
    <rect x="20" y="115" width="100" height="20" rx="4" fill="#11244d"/>
    <rect x="20" y="145" width="100" height="20" rx="4" fill="#11244d"/>

    <circle cx="35" cy="65" r="2" fill="#00eaff"/>
    <circle cx="35" cy="95" r="2" fill="#00eaff"/>
    <circle cx="35" cy="125" r="2" fill="#00eaff"/>
    <circle cx="35" cy="155" r="2" fill="#00eaff"/>

    <rect x="50" y="61" width="45" height="4" rx="2" fill="#1ce0ff"/>
    <rect x="50" y="91" width="45" height="4" rx="2" fill="#1ce0ff"/>
    <rect x="50" y="121" width="45" height="4" rx="2" fill="#1ce0ff"/>
    <rect x="50" y="151" width="45" height="4" rx="2" fill="#1ce0ff"/>
  </g>
</g>

<!-- ========================= -->
<!-- RIGHT SERVER RACK -->
<!-- ========================= -->
<g id="servers-right" transform="translate(1180,420)">
  <polygon points="0,40 70,0 140,40 70,80" fill="#0b1533"/>
  <polygon points="0,40 0,170 70,210 70,80" fill="#101c42"/>
  <polygon points="140,40 140,170 70,210 70,80" fill="#162856"/>

  <g>
    <rect x="20" y="55" width="100" height="20" rx="4" fill="#11244d"/>
    <rect x="20" y="85" width="100" height="20" rx="4" fill="#11244d"/>
    <rect x="20" y="115" width="100" height="20" rx="4" fill="#11244d"/>
    <rect x="20" y="145" width="100" height="20" rx="4" fill="#11244d"/>

    <circle cx="35" cy="65" r="2" fill="#00eaff"/>
    <circle cx="35" cy="95" r="2" fill="#00eaff"/>
    <circle cx="35" cy="125" r="2" fill="#00eaff"/>
    <circle cx="35" cy="155" r="2" fill="#00eaff"/>

    <rect x="50" y="61" width="45" height="4" rx="2" fill="#1ce0ff"/>
    <rect x="50" y="91" width="45" height="4" rx="2" fill="#1ce0ff"/>
    <rect x="50" y="121" width="45" height="4" rx="2" fill="#1ce0ff"/>
    <rect x="50" y="151" width="45" height="4" rx="2" fill="#1ce0ff"/>
  </g>
</g>

<!-- ========================= -->
<!-- CENTER SHIELD -->
<!-- ========================= -->
<g id="shield-core" transform="translate(720,430)">
  <!-- outer glow -->
  <circle cx="0" cy="0" r="120" fill="url(#shieldGlow)" opacity="0.3"/>

  <!-- shield -->
  <path d="M0,-120 
           L95,-60 
           L75,70
           L0,125
           L-75,70
           L-95,-60
           Z"
        fill="url(#shieldGradient)"
        stroke="#55f7ff"
        stroke-width="4"/>

  <!-- inner shield -->
  <path d="M0,-90 
           L70,-45 
           L55,52
           L0,95
           L-55,52
           L-70,-45
           Z"
        fill="#102245"
        stroke="#00eaff"
        stroke-width="2"/>

  <!-- lock body -->
  <rect x="-35" y="-5" width="70" height="60" rx="10"
        fill="#1a3a68"
        stroke="#5efbff"
        stroke-width="2"/>

  <!-- lock top -->
  <path d="M-20,-5 
           L-20,-30 
           A20 20 0 0 1 20 -30
           L20,-5"
        fill="none"
        stroke="#5efbff"
        stroke-width="8"/>

  <!-- keyhole -->
  <circle cx="0" cy="20" r="8" fill="#00eaff"/>
  <rect x="-3" y="20" width="6" height="16" fill="#00eaff"/>
</g>
  <!-- Part 3 Network + Cards -->
  <!-- ========================= -->
<!-- NETWORK CONNECTIONS -->
<!-- ========================= -->
<g id="network-grid" stroke="#00eaff" stroke-width="2" opacity="0.5" fill="none">

  <!-- left to shield -->
  <line x1="260" y1="500" x2="620" y2="450"/>
  <line x1="260" y1="560" x2="620" y2="490"/>

  <!-- right to shield -->
  <line x1="1180" y1="500" x2="820" y2="450"/>
  <line x1="1180" y1="560" x2="820" y2="490"/>

  <!-- nodes -->
  <circle cx="260" cy="500" r="6" fill="#00eaff"/>
  <circle cx="260" cy="560" r="6" fill="#00eaff"/>
  <circle cx="620" cy="450" r="6" fill="#00eaff"/>
  <circle cx="620" cy="490" r="6" fill="#00eaff"/>

  <circle cx="1180" cy="500" r="6" fill="#00eaff"/>
  <circle cx="1180" cy="560" r="6" fill="#00eaff"/>
  <circle cx="820" cy="450" r="6" fill="#00eaff"/>
  <circle cx="820" cy="490" r="6" fill="#00eaff"/>
</g>

<!-- ========================= -->
<!-- TOP SECURITY CARD -->
<!-- ========================= -->
<g id="card-top" transform="translate(560,120)">
  <rect width="320" height="120" rx="18"
        fill="rgba(20,35,80,0.85)"
        stroke="#2aeaff"
        stroke-width="2"/>

  <text x="30" y="40" fill="#ffffff"
        font-family="Arial"
        font-size="18"
        font-weight="bold">
    Threat Protection
  </text>

  <rect x="30" y="65" width="240" height="10" rx="5" fill="#102245"/>
  <rect x="30" y="65" width="190" height="10" rx="5" fill="#00eaff"/>

  <text x="280" y="74" fill="#00eaff"
        font-family="Arial"
        font-size="14">
    96%
  </text>
</g>

<!-- ========================= -->
<!-- LEFT FLOATING CARD -->
<!-- ========================= -->
<g id="card-left" transform="translate(180,200)">
  <rect width="240" height="100" rx="16"
        fill="#13274e"
        stroke="#00eaff"
        stroke-width="2"/>

  <text x="25" y="38" fill="#ffffff"
        font-family="Arial"
        font-size="16">
    Firewall Status
  </text>

  <circle cx="40" cy="68" r="8" fill="#00ff99"/>

  <text x="60" y="74" fill="#00ff99"
        font-family="Arial"
        font-size="15">
    Active
  </text>
</g>

<!-- ========================= -->
<!-- RIGHT FLOATING CARD -->
<!-- ========================= -->
<g id="card-right" transform="translate(1020,220)">
  <rect width="240" height="100" rx="16"
        fill="#13274e"
        stroke="#00eaff"
        stroke-width="2"/>

  <text x="25" y="38" fill="#ffffff"
        font-family="Arial"
        font-size="16">
    Secure Nodes
  </text>

  <text x="25" y="76" fill="#00eaff"
        font-family="Arial"
        font-size="28"
        font-weight="bold">
    248
  </text>
</g>

<!-- ========================= -->
<!-- BOTTOM DASHBOARD CARD -->
<!-- ========================= -->
<g id="card-bottom" transform="translate(520,730)">
  <rect width="400" height="90" rx="20"
        fill="#102245"
        stroke="#00eaff"
        stroke-width="2"/>

  <text x="30" y="35" fill="#ffffff"
        font-family="Arial"
        font-size="18">
    System Security Status
  </text>

  <text x="30" y="65" fill="#00ff99"
        font-family="Arial"
        font-size="16">
    All Systems Protected ✓
  </text>
</g>
</svg>