<!-- ========================= -->
<!-- SHIELD CORE -->
<!-- ========================= -->
<g id="shield-core" transform="translate(720,460)">

  <!-- Outer Pulse Glow -->
  <circle class="pulse-glow" cx="0" cy="0" r="170"
          fill="url(#cyanGlow)" opacity="0.25"/>

  <!-- Rotating Ring 1 -->
  <g class="rotate-ring">
    <circle cx="0" cy="0" r="160"
            fill="none"
            stroke="#00EAFF"
            stroke-width="2"
            opacity="0.35"
            stroke-dasharray="12 16"/>
  </g>

  <!-- Rotating Ring 2 -->
  <g class="rotate-ring-reverse">
    <circle cx="0" cy="0" r="140"
            fill="none"
            stroke="#00EAFF"
            stroke-width="1.5"
            opacity="0.25"
            stroke-dasharray="8 12"/>
  </g>

  <!-- Main Shield Glow -->
  <path d="
    M 0 -130
    L 95 -75
    L 78 65
    L 0 135
    L -78 65
    L -95 -75
    Z"
    fill="url(#shieldGradient)"
    filter="url(#shieldGlow)"
    opacity="0.95"/>

  <!-- Inner Shield -->
  <path d="
    M 0 -100
    L 72 -55
    L 58 50
    L 0 100
    L -58 50
    L -72 -55
    Z"
    fill="#081B3D"
    stroke="#00EAFF"
    stroke-width="2"/>

  <!-- Lock Body -->
  <rect x="-34" y="-10"
        width="68"
        height="62"
        rx="12"
        fill="#0D2C5A"
        stroke="#00EAFF"
        stroke-width="2"/>

  <!-- Lock Top -->
  <path d="
    M -20 -10
    L -20 -35
    A 20 20 0 0 1 20 -35
    L 20 -10"
    fill="none"
    stroke="#00EAFF"
    stroke-width="8"/>

  <!-- Keyhole -->
  <circle cx="0" cy="14" r="8" fill="#00EAFF"/>
  <rect x="-3" y="14" width="6" height="18" fill="#00EAFF"/>

  <!-- Orbit Dots -->
  <circle class="network-dot" cx="-140" cy="0" r="5" fill="#00EAFF"/>
  <circle class="network-dot" cx="140" cy="0" r="5" fill="#00EAFF"/>
  <circle class="network-dot" cx="0" cy="-140" r="5" fill="#00EAFF"/>
  <circle class="network-dot" cx="0" cy="140" r="5" fill="#00EAFF"/>

</g>

