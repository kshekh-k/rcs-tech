  <circle class="particle" cx="1150" cy="220" r="3" fill="#00EAFF"/>
  <circle class="particle" cx="1320" cy="140" r="2" fill="#00EAFF"/>

  <circle class="particle" cx="180" cy="700" r="2" fill="#00EAFF"/>
  <circle class="particle" cx="420" cy="760" r="3" fill="#00EAFF"/>
  <circle class="particle" cx="760" cy="780" r="2" fill="#00EAFF"/>

  <circle class="particle" cx="1080" cy="760" r="3" fill="#00EAFF"/>
