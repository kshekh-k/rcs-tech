  <polygon points="50,80 70,68 90,80 90,104 70,116 50,104"/>
  <polygon points="110,80 130,68 150,80 150,104 130,116 110,104"/>
  <polygon points="170,80 190,68 210,80 210,104 190,116 170,104"/>

  <polygon points="1230,80 1250,68 1270,80 1270,104 1250,116 1230,104"/>
  <polygon points="1290,80 1310,68 1330,80 1330,104 1310,116 1290,104"/>
  <polygon points="1350,80 1370,68 1390,80 1390,104 1370,116 1350,104"/>

  <!-- Row 2 -->
  <polygon points="20,140 40,128 60,140 60,164 40,176 20,164"/>
  <polygon points="80,140 100,128 120,140 120,164 100,176 80,164"/>
  <polygon points="140,140 160,128 180,140 180,164 160,176 140,164"/>

  <polygon points="1260,140 1280,128 1300,140 1300,164 1280,176 1260,164"/>
  <polygon points="1320,140 1340,128 1360,140 1360,164 1340,176 1320,164"/>
</g>

