<svg width="1440" height="900" viewBox="0 0 1440 900"
     xmlns="http://www.w3.org/2000/svg">

<defs>

  <!-- ========================= -->
  <!-- MAIN BACKGROUND -->
  <!-- ========================= -->
  <!-- <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#020817"/>
    <stop offset="50%" stop-color="#071B3A"/>
    <stop offset="100%" stop-color="#010A18"/>
  </linearGradient> -->

  <!-- CARD -->
  <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0E214D"/>
    <stop offset="100%" stop-color="#09142F"/>
  </linearGradient>

  <!-- SHIELD -->
  <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00E7FF"/>
    <stop offset="100%" stop-color="#286CFF"/>
  </linearGradient>

  <!-- CYAN GLOW -->
  <radialGradient id="cyanGlow">
    <stop offset="0%" stop-color="#00EAFF" stop-opacity="0.65"/>
    <stop offset="100%" stop-color="#00EAFF" stop-opacity="0"/>
  </radialGradient>

  <!-- SHIELD GLOW -->
  <filter id="shieldGlow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="10" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- CARD GLOW -->
  <filter id="cardGlow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- GLASS BLUR -->
  <filter id="glassBlur">
    <feGaussianBlur stdDeviation="8"/>
  </filter>

</defs>

<style>
  .pulse-glow {
    animation: pulseGlow 3s ease-in-out infinite;
  }

  .float-card {
    animation: floatCard 4s ease-in-out infinite;
  }

  .rotate-ring {
    animation: spinRing 30s linear infinite;
  }
  .rotate-ring-reverse {
    animation: spinRingReverse 30s linear infinite;
  }

  .particle {
    animation: particleMove 5s infinite alternate ease-in-out;
  }

  .network-dot {
    animation: blinkDot 1.5s infinite;
  }

  @keyframes pulseGlow {
    0% { opacity: 0.65; }
    50% { opacity: 1; }
    100% { opacity: 0.65; }
  }

  @keyframes floatCard {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
  }

  @keyframes spinRing {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
  }
  @keyframes spinRingReverse {
  from { transform: rotate(360deg); }
  to { transform: rotate(0deg); }
  }

  @keyframes rotateRing {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes particleMove {
    from { transform: translateY(0px); opacity: 0.4; }
    to { transform: translateY(-12px); opacity: 1; }
  }

  @keyframes blinkDot {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
  }
</style>


<!-- ========================= -->
<!-- BACKGROUND -->
<!-- ========================= -->
<g id="background">
  <rect width="1440" height="900" fill="url(#bgGradient)"/>
  <!-- ambient glow -->
  <!-- <circle cx="320" cy="180" r="220" fill="url(#cyanGlow)" opacity="0.25"/> -->
  <!-- <circle cx="1120" cy="700" r="280" fill="url(#cyanGlow)" opacity="0.2"/> -->
  <circle cx="720" cy="450" r="180" fill="url(#cyanGlow)" opacity="0.12"/>
</g>

